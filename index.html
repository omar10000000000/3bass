<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تنبيه أمان</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fff5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            border: 2px solid #f39c12;
        }
        .warning-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }
        h1 {
            color: #d35400;
            font-size: 28px;
            margin-bottom: 15px;
        }
        p {
            color: #2c3e50;
            font-size: 20px;
            line-height: 1.5;
            font-weight: bold;
        }
        .footer-note {
            margin-top: 20px;
            font-size: 14px;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="warning-icon">🚫</div>
        <h1>رسالة هامة جداً</h1>
        <p>خدي بالك يا <strong>عباس</strong>، متفتحيش أي لينك يتبعتلك بعد كدا مهما كان السبب!</p>
        <div class="footer-note">للأمان فقط.. يرجى الحذر.</div>
    </div>

</body>
</html>
